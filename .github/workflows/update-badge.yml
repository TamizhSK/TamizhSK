name: Update Builders Badge

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install jq

      - name: Fetch view count
        run: |
          RESPONSE=$(curl -s "https://komarev.com/ghpvc/?username=TamizhSK")
      
          COUNT=$(echo "$RESPONSE" | grep -oE '>[0-9]+<' | tr -d '><' | head -1)
      
          if [ -z "$COUNT" ]; then
            COUNT="0"
          fi
      
          echo "COUNT=$COUNT" >> $GITHUB_ENV

      - name: Generate responsive SVG
        run: |
          CHAR_WIDTH=8
          BASE_WIDTH=95
          COUNT_WIDTH=$((${#COUNT} * CHAR_WIDTH))
          WIDTH=$((BASE_WIDTH + COUNT_WIDTH))
      
          sed -e "s/{{COUNT}}/$COUNT/g" \
              -e "s/{{WIDTH}}/$WIDTH/g" \
              builders-badge-template.svg > builders-badge.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add builders-badge.svg
          git commit -m "Update builders badge" || echo "No changes"
          git push
