name: Update Builders Badge

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch view count
        id: fetch
        run: |
          COUNT=$(curl -s "https://komarev.com/ghpvc/?username=TamizhSK&label=&color=0d1117&style=flat" | grep -oE '[0-9]+' | head -1)
          echo "COUNT=$COUNT" >> $GITHUB_ENV

      - name: Generate responsive SVG
        run: |
          COUNT="$COUNT"
          LABEL="builders"
      
          COUNT_LEN=${#COUNT}
          LABEL_LEN=${#LABEL}
      
          # Character width approximation for system font (~7px)
          LABEL_WIDTH=$((LABEL_LEN * 7))
          COUNT_WIDTH=$((COUNT_LEN * 8))
      
          PADDING=60
          WIDTH=$((LABEL_WIDTH + COUNT_WIDTH + PADDING))
      
          # Replace count
          sed "s/{{COUNT}}/$COUNT/g" builders-badge-template.svg > temp.svg
      
          # Inject width + viewBox
          sed -i "1s|<svg xmlns=\"http://www.w3.org/2000/svg\">|<svg width=\"$WIDTH\" height=\"34\" viewBox=\"0 0 $WIDTH 34\" xmlns=\"http://www.w3.org/2000/svg\">|" temp.svg
      
          # Resize background
          sed -i "s/id=\"bgRect\"/id=\"bgRect\" width=\"$WIDTH\"/" temp.svg
      
          # Position count properly with spacing
          COUNT_X=$((LABEL_WIDTH + 50))
          sed -i "s/id=\"count\"/id=\"count\" x=\"$COUNT_X\"/" temp.svg
      
          mv temp.svg builders-badge.svg
          
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add builders-badge.svg
          git commit -m "Update builders badge" || echo "No changes"
          git push
