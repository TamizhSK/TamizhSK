name: Update Builders Badge
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch view count
        run: |
          # Fetch the SVG badge from Komarev
          RESPONSE=$(curl -s "https://komarev.com/ghpvc/?username=TamizhSK")
          
          # Extract the count from the SVG text element
          # The SVG contains something like: <text ...>123</text>
          COUNT=$(echo "$RESPONSE" | grep -oP '(?<=<text[^>]*>)[0-9]+(?=</text>)' | head -1)
          
          # Fallback if extraction fails
          if [ -z "$COUNT" ]; then
            echo "Failed to extract count, using fallback"
            COUNT="0"
          fi
          
          echo "Extracted count: $COUNT"
          echo "COUNT=$COUNT" >> $GITHUB_ENV
      
      - name: Generate responsive SVG
        run: |
          CHAR_WIDTH=8
          BASE_WIDTH=95
          COUNT_WIDTH=$((${#COUNT} * CHAR_WIDTH))
          WIDTH=$((BASE_WIDTH + COUNT_WIDTH))
          
          echo "Generating SVG with width: $WIDTH and count: $COUNT"
          
          sed -e "s/9/$COUNT/g" \
              -e "s/103/$WIDTH/g" \
              builders-badge-template.svg > builders-badge.svg
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builders-badge.svg
          git diff --staged --quiet || git commit -m "Update builders badge: $COUNT views"
          git push
