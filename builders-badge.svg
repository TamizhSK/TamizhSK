<svg width="112" height="34" viewBox="0 0 112 34" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Measure text width manually in Action (dynamic padding applied there) -->
  <rect id="bgRect" width="112"
        x="0"
        y="0"
        rx="17"
        height="34"
        fill="url(#bg)" />

  <circle cx="18" cy="17" r="5" fill="#3fb950">
    <animate attributeName="opacity"
             values="0.5;1;0.5"
             dur="2.2s"
             repeatCount="indefinite"/>
  </circle>

  <text id="label"
        x="36"
        y="21"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial"
        font-size="13"
        fill="#9da7b3">
    builders
  </text>

  <text id="count" x="84"
        y="21"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial"
        font-size="13"
        fill="#e6edf3">
    3
  </text>

</svg>
