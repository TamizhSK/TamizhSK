<svg width="210" height="34" viewBox="0 0 210 34" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="210" y2="34">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <rect width="210" height="34" rx="17" fill="url(#bg)" />

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="208" height="32" rx="16"
        fill="none"
        stroke="rgba(255,255,255,0.04)" />

  <!-- Breathing dot -->
  <circle cx="22" cy="17" r="5" fill="#3fb950">
    <animate attributeName="opacity"
             values="0.4;1;0.4"
             dur="2.4s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="40" y="21"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial"
        font-size="13"
        fill="#9da7b3"
        letter-spacing="0.4">
    builders
  </text>

  <!-- Dynamic Count -->
  <text x="150" y="21"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial"
        font-size="13"
        fill="#e6edf3">
    3
  </text>

</svg>
