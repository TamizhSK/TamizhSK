<svg xmlns="http://www.w3.org/2000/svg" width="{{WIDTH}}" height="34" viewBox="0 0 {{WIDTH}} 34">
  <!-- Transparent background with dark border -->
  <rect width="{{WIDTH}}" height="34" rx="17" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Green dot -->
  <circle cx="18" cy="17" r="6" fill="#00ED76"/>
  
  <!-- Text -->
  <text x="32" y="21" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">builders</text>
  
  <!-- Count text (no background) -->
  <text x="{{COUNT_TEXT_X}}" y="21" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">{{COUNT}}</text>
</svg>